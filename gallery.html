        .folder-card {
    position: relative;
    overflow: hidden;
    background: #0f172a; /* Warna cadangan */
}

/* Background Image Layer */
.folder-bg {
    position: absolute;
    inset: 0;
    background-size: cover;
    background-position: center;
    opacity: 0.3; /* Foto agak gelap pas normal */
    filter: grayscale(100%);
    transition: all 0.6s ease;
}

.folder-card:hover .folder-bg {
    opacity: 0.6;
    filter: grayscale(0%);
    transform: scale(1.1);
}

/* Overlay biar teks tetep kebaca */
.folder-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, #020617 20%, transparent 100%);
}
